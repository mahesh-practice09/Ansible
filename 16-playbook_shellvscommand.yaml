---
- name: shell vs command module
  hosts: local
  connection: local
  tasks:
    # - name: command module
    #   ansible.builtin.command: cat /etc/passwd | grep root

    - name: shell module
      ansible.builtin.shell: cat /etc/passwd | grep root
      register: shell_output

    - name: shell output details
      ansible.builtin.debug:
        msg: "{{ shell_output }}"