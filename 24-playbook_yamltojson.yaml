---
- name: convert dict to items
  hosts: local
  connection: local
  vars:
    Course: "Devops with Ansible"
  tasks:
  - name: get file students.yaml
    ansible.builtin.set_fact:
      students_data: "{{ lookup('file','students.yaml') | from_yaml }}"

  - name:
    ansible.builtin.debug:
      msg: "{{ students_data | to_nice_json }}"

  - name:
    ansible.builtin.debug:
      msg: "{{ Course | lower }}"
