---
- name: Install packages
  hosts: local
  connection: local
  become: true
  tasks:
   - name: Install packages 
     ansible.builtin.package:
       name:  "{{ item.name }}"
       state: "{{ item.state }}"
     loop:
       - {name: mysql , state: present }
       - {name: nginx , state: present }
       - {name: zip , state: absent }